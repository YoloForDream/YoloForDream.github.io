    <circle cx="15" cy="20" r="12" fill="#4facfe"/>
    <circle cx="15" cy="20" r="6" fill="#00f2fe"/>
    
    <line x1="-30" y1="-10" x2="0" y2="-10" stroke="#4facfe" stroke-width="2"/>
    <line x1="0" y1="-10" x2="30" y2="-10" stroke="#4facfe" stroke-width="2"/>
    <line x1="-30" y1="-10" x2="-15" y2="20" stroke="#4facfe" stroke-width="2"/>
    <line x1="0" y1="-10" x2="-15" y2="20" stroke="#4facfe" stroke-width="2"/>
    <line x1="0" y1="-10" x2="15" y2="20" stroke="#4facfe" stroke-width="2"/>
    <line x1="30" y1="-10" x2="15" y2="20" stroke="#4facfe" stroke-width="2"/>
    
    <text x="0" y="60" text-anchor="middle" fill="#4facfe" font-size="16" font-family="Arial">AI Neural Network</text>
  </g>
  
  <g transform="translate(960, 144)">
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="none" stroke="#00f2fe" stroke-width="3"/>
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#4facfe" stroke-width="2"/>
    
    <circle cx="0" cy="0" r="35" fill="none" stroke="#00f2fe" stroke-width="2"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#4facfe" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#00f2fe" filter="url(#glow)"/>
    
    <circle cx="-15" cy="-25" r="8" fill="#4facfe"/>
    <circle cx="15" cy="-25" r="8" fill="#4facfe"/>
    <circle cx="-25" cy="5" r="6" fill="#4facfe"/>
    <circle cx="25" cy="5" r="6" fill="#4facfe"/>
    <circle cx="-15" cy="25" r="6" fill="#4facfe"/>
    <circle cx="15" cy="25" r="6" fill="#4facfe"/>
    

  <circle cx="560" cy="144" r="6" fill="#4facfe"/>
  <circle cx="800" cy="144" r="6" fill="#4facfe"/>
  
  <line x1="1120" y1="144" x2="1360" y2="144" stroke="#00f2fe" stroke-width="2" stroke-dasharray="10,5"/>
  <circle cx="1120" cy="144" r="6" fill="#00f2fe"/>
  <circle cx="1360" cy="144" r="6" fill="#00f2fe"/>
  
  <circle cx="100" cy="70" r="2" fill="#4facfe" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1820" cy="218" r="3" fill="#00f2fe" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>

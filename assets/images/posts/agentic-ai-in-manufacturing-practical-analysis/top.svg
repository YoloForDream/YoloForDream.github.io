    <circle cx="-30" cy="-10" r="12" fill="#4facfe"/>
    <circle cx="-30" cy="-10" r="6" fill="#00f2fe"/>
    
    <circle cx="0" cy="-10" r="12" fill="#4facfe"/>
    <circle cx="0" cy="-10" r="6" fill="#00f2fe"/>
    
    <circle cx="30" cy="-10" r="12" fill="#4facfe"/>
    <circle cx="30" cy="-10" r="6" fill="#00f2fe"/>
    
    <circle cx="-15" cy="20" r="12" fill="#4facfe"/>

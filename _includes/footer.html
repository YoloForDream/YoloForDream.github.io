<footer class="footer">
	<ul class="footer-links">
		{% for social in site.data.settings.social %}
		<li>
			<a href="{{ social.link }}" title="{{ social.name }}">
				<i class="fa fa-inverse fa-{{ social.icon }} fa-3x"></i>
			</a>
		</li>
		{% endfor %}
	</ul>
	<p class="footer-copyright">&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}. All rights reserved.</p>
</footer>
